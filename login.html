<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion | Electro Innova</title>
    <link rel="stylesheet" href="LOGIN CSS/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
    <main class="login">
        <section class="login-window">
            <div class="logo">
                <div class="logo-container">
                    <img src="Images/Identity/WhatsApp Image 2026-05-16 at 13.02.07.jpeg">
                </div>
            </div>
            <div class="formulario">
                <form action="" id="login-form" class="inputs-container"> 
                    <h2>Inicia sesión.</h2>
                
                    <div class="user-data">
                        <label>Correo Electronico:</label>
                        <input type="email" name="email" required placeholder="Ingresa tu correo...">
                    </div>
                
                    <div class="user-data">
                        <label>Contraseña:</label>
                        <input type="password" name="password" required placeholder="Ingresa tu contraseña...">
                    </div>
                
                    <input type="submit" value="Iniciar sesion.">
                
                    <hr>
                    
                    <div class="create-account">
                        <h3>¿No tienes una cuenta?</h3>
                        <a href="" id="ir-a-registro">Crea una aquí</a>
                    </div>
                </form>
            </div>
        </section>

        <section class="login-window login-2">
            <div class="formulario">
                <form action="" id="register-form" class="inputs-container registration-form"> 
                    <h2>Crea tu cuenta.</h2>
                
                    <div class="user-data">
                        <label>Nombre:</label>
                        <input type="text" name="name" required placeholder="Ingresa tu nombre..."> 
                    </div>
                
                    <div class="user-data">
                        <label>Apellido:</label>
                        <input type="text" name="secondName" required placeholder="Ingresa tu apellido..."> 
                    </div>
                
                    <div class="user-data">
                        <label>Correo Electronico:</label>
                        <input type="email" name="email" required placeholder="Ingresa tu correo...">
                    </div>
                
                    <div class="user-data">
                        <label>Contraseña:</label>
                        <input type="password" name="password" required placeholder="Ingresa tu contraseña...">
                    </div>
                
                    <div class="user-data">
                        <label>Confirmar tu contraseña:</label>
                        <input type="password" name="confirm-password" required placeholder="Vuelve a escribir tu contraseña...">
                    </div>
                
                    <div class="user-terms">
                        <input type="checkbox" id="terms-accept" name="accept-terms" class="casilla">
                        <label for="terms-accept" class="terms-description">
                            Acepto los <a href="terms-conditions.html?from=auth" class="legal-link">Terminos y Condiciones </a>y la <a href="privacy-policy.html?from=auth" class="legal-link">Politica de Privacidad</a> basados en la Ley Nº 25.326.
                        </label>
                    </div>
                
                    <input type="submit" value="Crear cuenta.">

                    <hr>

                    <div class="create-account">
                        <h3>¿Ya tienes una cuenta?</h3>
                        <a href="" id="ir-a-inicio-sesion">Inicia sesion aquí.</a>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <script type="module" src="JS/login.js"></script>
</body>
</html>
