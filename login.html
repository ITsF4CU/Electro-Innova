<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion | Electro Innova</title>
    <link rel="stylesheet" href="LOGIN CSS/styles.css">
</head>

<body>
    <main class="login">
        <section class="login-window">
            <div class="logo">
                <div class="logo-container">
                    <img src="Images/Identity/WhatsApp Image 2026-05-16 at 13.02.07.jpeg">
                </div>
            </div>
            <div class="formulario">
                <form>
                    <h1>Bienvenido a Electro Innova</h1>
                    <h2>Iniciar Sesion</h2>

                    <div class="user-data">
                        <label>Correo electronico:</label>
                        <input type="email" required placeholder="Ingresa tu correo electronico...">
                    </div>

                    <div class="user-data">
                        <label>Contraseña:</label>
                        <input type="password" required placeholder="Ingresa tu contraseña...">
                    </div>

                    <input type="submit" value="Ingresar">

                    <hr>

                    <div class="create-account">
                        <h3>¿No tienes una cuenta?</h3>
                        <a href="" id="ir-a-registro">Crea una aquí</a>
                    </div>
                </form>
            </div>
        </section>

        <section class="login-window login-2">
            <div class="formulario">
                <form id="register-form">
                    <h1>Registrarse</h1>
                    <h2>Crear cuenta: </h2>

                    <div class="user-data">
                        <label>Nombre:</label>
                        <input type="text" required placeholder="Ingresa tu nombre..." id="register_userName"
                            name="name">
                    </div>

                    <div class="user-data">
                        <label>Apellido:</label>
                        <input type="text" required placeholder="Ingresa tu apellido..." id="register_userSecondName"
                            name="secondName">
                    </div>

                    <div class="user-data">
                        <label>Correo electronico:</label>
                        <input type="email" required placeholder="Ingresa tu correo..." id="register_userMail"
                            name="email">
                    </div>

                    <div class="user-data">
                        <label>Contraseña:</label>
                        <input type="password" required placeholder="Ingresa tu contraseña..." id="register_userPass"
                            name="password">
                    </div>

                    <div class="user-data">
                        <label>Confirmar tu contraseña:</label>
                        <input type="password" required placeholder="Vuelve a escribir tu contraseña..."
                            id="register_userConfPass" name="confirm-password">
                    </div>

                    <input type="submit" value="Crear cuenta.">

                    <hr>

                    <div class="create-account">
                        <h3>¿Ya tienes una cuenta?</h3>
                        <a href="" id="ir-a-inicio-sesion">Inicia sesion aquí.</a>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <script type="module" src="JS/login.js"></script>
</body>

</html>
