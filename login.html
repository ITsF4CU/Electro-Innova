<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion | Electro Innova</title>
    <link rel="stylesheet" href="LOGIN CSS/styles.css">
</head>
<body>
    <main class="login">
        <section class="login-window">
            <div class="logo">
                <div class="logo-container">
                    <img src="Images/Identity/WhatsApp Image 2026-05-16 at 13.02.07.jpeg">
                </div>
            </div>
            <div class="formulario">
                <form>
                    <h1>Bienvenido a Electro Innova</h1>
                    <h2>Iniciar Sesion</h2>
                    <div class="user-data">
                        <label>Usuario:</label>
                        <input type="text" required placeholder="Ingresa tu usuario...">
                    </div>

                    <div class="user-data">
                        <label>Correo electronico:</label>
                        <input type="email" required placeholder="Ingresa tu correo electronico...">
                    </div>

                    <div class="user-data">
                        <label>Contraseña:</label>
                        <input type="password" required placeholder="Ingresa tu contraseña...">
                    </div>

                    <input type="submit" value="Ingresar">

                    <hr>

                    <div class="create-account">
                        <h3>¿No tienes una cuenta?</h3>
                        <a href="" id="ir-a-registro">Crea una aquí</a>
                    </div>
                </form>
            </div>
        </section>

        <section class="login-window login-2">
            <div class="formulario">
                <form>
                    <h1>Registrarse</h1>
                    <h2>Crear cuenta: </h2>

                    <div class="user-data">
                        <label>Nombre:</label>
                        <input type="text" required placeholder="Ingresa tu nombre...">
                    </div>

                    <div class="user-data">
                        <label>Apellido:</label>
                        <input type="text" required placeholder="Ingresa tu apellido...">
                    </div>

                    <div class="user-data">
                        <label>Correo electronico:</label>
                        <input type="email" required placeholder="Ingresa tu correo...">
                    </div>

                    <div class="user-data">
                        <label>Contraseña:</label>
                        <input type="password" required placeholder="Ingresa tu contraseña...">
                    </div>

                    <div class="user-data">
                        <label>Confirmar tu contraseña:</label>
                        <input type="password" required placeholder="Vuelve a escribir tu contraseña...">
                    </div>

                    <input type="submit" value="Crear cuenta.">

                    <hr>

                    <div class="create-account">
                        <h3>¿Ya tienes una cuenta?</h3>
                        <a href="" id="ir-a-inicio-sesion">Inicia sesion aquí.</a>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <script src="JS/login.js"></script>
</body>
</html>
